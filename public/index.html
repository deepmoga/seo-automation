<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Automation Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🤖 SEO Automation Dashboard</h1>
        <div class="site-url" id="siteUrl">Loading...</div>
      </div>
      <a class="settings-link" href="/logout">🚪 Logout</a>
    </div>

    <div class="nav-links">
      <a href="/" class="active">Dashboard</a>
      <a href="/sites">Sites</a>
      <a href="/settings">Settings</a>
    </div>

    <div class="field" style="max-width:400px;">
      <label for="siteSelect">Site</label>
      <select id="siteSelect"></select>
    </div>

    <div class="actions">
      <button id="btnAudit">🔎 Run Audit (Crawl + Analyze)</button>
      <button id="btnAuditFix">🔧 Run Audit + AI Auto-Fix</button>
      <button id="btnSuggestions">💡 Generate SEO Suggestions</button>
      <button id="btnMetaSuggestions">📝 Generate Meta Suggestions</button>
    </div>

    <div class="status-bar">
      Status: <span class="badge idle" id="statusBadge">idle</span>
      <span id="statusMeta"></span>
    </div>

    <div class="logs" id="logs">No logs yet. Run an audit to get started.</div>

    <div class="summary" id="summary"></div>

    <table id="reportTable" style="display:none;">
      <thead>
        <tr>
          <th>Page URL</th>
          <th>SEO Score</th>
          <th>Issues</th>
        </tr>
      </thead>
      <tbody id="reportBody"></tbody>
    </table>

    <div class="section" id="suggestionsSection" style="display:none;">
      <h2>💡 SEO Improvement Suggestions</h2>
      <div id="suggestionsList"></div>
    </div>

    <div class="section" id="keywordsSection" style="display:none;">
      <h2>🔑 Keyword Analysis</h2>
      <div class="kw-grid">
        <div>
          <h3>Main Keywords</h3>
          <ul class="kw-list" id="topKeywordsList"></ul>
        </div>
        <div>
          <h3>Long-Tail Keyword Opportunities</h3>
          <ul class="kw-list" id="longTailList"></ul>
        </div>
      </div>
    </div>

    <div class="section" id="metaSuggestionsSection" style="display:none;">
      <h2>📝 Per-Page Meta Suggestions</h2>
      <div id="metaSuggestionsList"></div>
    </div>
  </div>

  <script>
    const siteSelect = document.getElementById('siteSelect');
    const btnAudit = document.getElementById('btnAudit');
    const btnAuditFix = document.getElementById('btnAuditFix');
    const btnSuggestions = document.getElementById('btnSuggestions');
    const btnMetaSuggestions = document.getElementById('btnMetaSuggestions');
    const statusBadge = document.getElementById('statusBadge');
    const statusMeta = document.getElementById('statusMeta');
    const logsEl = document.getElementById('logs');
    const summaryEl = document.getElementById('summary');
    const reportTable = document.getElementById('reportTable');
    const reportBody = document.getElementById('reportBody');
    const suggestionsSection = document.getElementById('suggestionsSection');
    const suggestionsList = document.getElementById('suggestionsList');
    const keywordsSection = document.getElementById('keywordsSection');
    const topKeywordsList = document.getElementById('topKeywordsList');
    const longTailList = document.getElementById('longTailList');
    const metaSuggestionsSection = document.getElementById('metaSuggestionsSection');
    const metaSuggestionsList = document.getElementById('metaSuggestionsList');

    let polling = null;

    function currentSiteId() {
      return siteSelect.value;
    }

    async function loadSites() {
      const res = await fetch('/api/sites');
      const data = await res.json();
      const sites = data.sites || [];

      if (sites.length === 0) {
        document.getElementById('siteUrl').textContent = 'No sites configured - add one on the Sites page.';
        return;
      }

      const saved = localStorage.getItem('selectedSiteId');
      siteSelect.innerHTML = sites.map((s) =>
        `<option value="${s.id}">${s.name} (${s.siteUrl})</option>`
      ).join('');

      if (saved && sites.some((s) => s.id === saved)) {
        siteSelect.value = saved;
      }

      await loadConfig();
      await loadReport();
    }

    siteSelect.addEventListener('change', async () => {
      localStorage.setItem('selectedSiteId', currentSiteId());
      await loadConfig();
      await loadReport();
    });

    async function loadConfig() {
      const res = await fetch(`/api/config?siteId=${currentSiteId()}`);
      const data = await res.json();
      document.getElementById('siteUrl').textContent =
        `Target: ${data.siteUrl} (max ${data.maxPages} pages)`;
    }

    function scoreClass(score) {
      if (score >= 80) return 'good';
      if (score >= 50) return 'mid';
      return 'bad';
    }

    function renderSuggestions(suggestions) {
      if (!suggestions || suggestions.length === 0) {
        suggestionsSection.style.display = 'none';
        return;
      }

      suggestionsSection.style.display = 'block';
      suggestionsList.innerHTML = suggestions.map((s) => `
        <div class="suggestion">
          <div class="s-title"><span class="prio ${s.priority || 'medium'}">${s.priority || 'medium'}</span>${s.title || ''}</div>
          <div class="s-detail">${s.detail || ''}</div>
        </div>
      `).join('');
    }

    function renderKeywords(keywords) {
      if (!keywords || (!keywords.topKeywords?.length && !keywords.longTailKeywords?.length)) {
        keywordsSection.style.display = 'none';
        return;
      }

      keywordsSection.style.display = 'block';

      topKeywordsList.innerHTML = (keywords.topKeywords || []).map((k) => `
        <li><span>${k.keyword}</span><span class="count">${k.frequency} (${k.pageCount} pages)</span></li>
      `).join('') || '<li>None detected</li>';

      longTailList.innerHTML = (keywords.longTailKeywords || []).map((k) => `
        <li><span>${k.phrase}</span><span class="count">${k.frequency} (${k.pageCount} pages)</span></li>
      `).join('') || '<li>None detected</li>';
    }

    function renderMetaSuggestions(metaSuggestions) {
      if (!metaSuggestions || Object.keys(metaSuggestions).length === 0) {
        metaSuggestionsSection.style.display = 'none';
        return;
      }

      metaSuggestionsSection.style.display = 'block';

      metaSuggestionsList.innerHTML = Object.entries(metaSuggestions).map(([url, s]) => `
        <details class="page-detail">
          <summary>${url}</summary>
          <div class="meta-suggestion">
            <div class="label">Suggested Title</div>
            <div class="new">${s.title || ''}</div>
            <div class="label">Suggested Meta Description</div>
            <div class="new">${s.metaDescription || ''}</div>
            <div class="label">Suggested Meta Keywords</div>
            <div class="new">${s.metaKeywords || ''}</div>
            ${s.reason ? `<div class="reason">${s.reason}</div>` : ''}
          </div>
        </details>
      `).join('');
    }

    function renderReport(report) {
      if (!report.exists) {
        summaryEl.innerHTML = '';
        reportTable.style.display = 'none';
        renderSuggestions(null);
        renderKeywords(null);
        renderMetaSuggestions(null);
        return;
      }

      const pages = report.pages || [];
      const avgScore = pages.length
        ? Math.round(pages.reduce((s, p) => s + p.seoScore, 0) / pages.length)
        : 0;

      let critical = 0, warning = 0, info = 0;
      for (const p of pages) {
        for (const issue of p.issues || []) {
          if (issue.severity === 'critical') critical++;
          else if (issue.severity === 'warning') warning++;
          else info++;
        }
      }

      summaryEl.innerHTML = `
        <div class="stat"><strong>${pages.length}</strong>Pages crawled</div>
        <div class="stat"><strong>${avgScore}</strong>Avg SEO score</div>
        <div class="stat"><strong>${critical}</strong>🔴 Critical</div>
        <div class="stat"><strong>${warning}</strong>🟡 Warning</div>
        <div class="stat"><strong>${info}</strong>🔵 Info</div>
      `;

      reportBody.innerHTML = pages.map((p) => `
        <tr>
          <td><a href="${p.url}" target="_blank" style="color:#94a3b8;text-decoration:none;">${p.url}</a></td>
          <td class="score ${scoreClass(p.seoScore)}">${p.seoScore}/100</td>
          <td>${(p.issues || []).length}</td>
        </tr>
      `).join('');

      reportTable.style.display = pages.length ? 'table' : 'none';

      renderSuggestions(report.suggestions);
      renderKeywords(report.keywords);
      renderMetaSuggestions(report.metaSuggestions);
    }

    async function loadReport() {
      const res = await fetch(`/api/report?siteId=${currentSiteId()}`);
      const data = await res.json();
      renderReport(data);
    }

    async function poll() {
      const res = await fetch('/api/status');
      const data = await res.json();

      statusBadge.textContent = data.status;
      statusBadge.className = 'badge ' + data.status;

      statusMeta.textContent = data.mode
        ? ` | mode: ${data.mode}${data.error ? ' | error: ' + data.error : ''}`
        : '';

      logsEl.textContent = data.logs && data.logs.length
        ? data.logs.join('\n')
        : 'No logs yet. Run an audit to get started.';
      logsEl.scrollTop = logsEl.scrollHeight;

      const running = data.status === 'running';
      btnAudit.disabled = running;
      btnAuditFix.disabled = running;
      btnSuggestions.disabled = running;
      btnMetaSuggestions.disabled = running;

      if (data.status === 'done' || data.status === 'error') {
        if (polling) {
          clearInterval(polling);
          polling = null;
        }
        loadReport();
      }
    }

    async function startJob(mode) {
      const res = await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode, siteId: currentSiteId() })
      });

      if (res.status === 409) {
        alert('A job is already running.');
        return;
      }

      if (res.status >= 400) {
        const data = await res.json().catch(() => ({}));
        alert(data.error || 'Failed to start job.');
        return;
      }

      if (!polling) {
        polling = setInterval(poll, 1500);
      }
      poll();
    }

    btnAudit.addEventListener('click', () => startJob('audit'));
    btnAuditFix.addEventListener('click', () => {
      if (confirm('This will use AI to generate fixes and apply them to your live WordPress site. Continue?')) {
        startJob('audit-fix');
      }
    });
    btnSuggestions.addEventListener('click', () => startJob('suggestions'));
    btnMetaSuggestions.addEventListener('click', () => {
      if (confirm('This will use AI to generate per-page title/meta suggestions for all pages with issues. Continue?')) {
        startJob('meta-suggestions');
      }
    });

    loadSites();
    poll();
  </script>
</body>
</html>
